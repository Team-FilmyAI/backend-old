<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
</head>
<body>
	<h2>Welcome to Your Profile</h2>
	<p>Profile details will be displayed here.</p>

	<div th:if="${artist != null}">
		<p>
			<strong>Name:</strong> <span
				th:text="${artist.firstName} + ' ' + ${artist.lastName}"></span>
		</p>
		<p>
			<strong>Email:</strong> <span th:text="${artist.email}"></span>
		</p>
		<p>
			<strong>Occupation:</strong> <span th:text="${artist.occupation}"></span>
		</p>
		<p>
			<strong>Portfolio:</strong> <a th:href="${artist.portfolio}"
				target="_blank">View Portfolio</a>
		</p>

		<div th:if="${artist.profilePhotoPath != null}">
			<img th:src="@{${artist.profilePhotoPath}}" alt="Profile Photo"
				width="200" />
		</div>
	</div>


</body>
</html>
