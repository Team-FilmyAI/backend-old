<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="/css/forgot.css">
</head>
<body>
	<div class="container">
		<div class="left-section">
			<div class="background-image"></div>
		</div>
		<div class="right-section">
			<h2 class="title">Forgot Password ?</h2>
			<div class="input-container">
				<input type="text" id="emailInput"
					placeholder="Email address or Username" class="input-field">
			</div>
			<div class="back-link">
				<label><a href="login">Log in</a></label>
			</div>
			<button class="send-btn" onclick="sendResetRequest()">Send</button>
			<p class="or-text">Or</p>
			<div class="social-icons">
				<i class="fab fa-google"></i> <i class="fab fa-facebook-f"></i> <i
					class="fab fa-instagram"></i> <i class="fa-brands fa-linkedin"></i>
			</div>
		</div>
	</div>

	<!-- Popup Overlay (background) -->
	<div id="popupOverlay" class="overlay"></div>

	<!-- Popup message container -->
	<div id="popupMessage" class="popup">
		<p id="popupText"></p>
		<button id="closePopupBtn" class="close-btn">Close</button>
	</div>
	<script src="/js/forgot.js"></script>

</body>
</html>
